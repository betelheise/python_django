{% extends 'education/base.html' %}
{% block title %}Select Algorithm Set{% endblock %}

{% block content %}
    <h1 style="text-align: center;">Choose an Algorithm Set</h1>

    <div class="group-grid">
        {% for set in alg_sets %}
            <a href="{% url 'set_detail' set.pk %}" class="group-card">
                <div class="group-image">
                    {% if set.image %}
                        <img src="{{ set.image.url }}" alt="{{ set.name }}" style="width:100%;
                         height:100%; object-fit:cover;">
                    {% else %}
                        🧊 <!-- Default image if they don't upload one -->
                    {% endif %}
                </div>
                <div class="group-title">{{ set.name }}</div>
            </a>
        {% endfor %}

        <!-- The Add Group Button -->
        <a href="{% url 'add_set' %}" class="group-card add-group-card">
            <span style="font-size: 3rem; color: #888;">+</span>
            <div class="group-title" style="color: #888;">Add Group</div>
        </a>
    </div>
{% endblock %}
