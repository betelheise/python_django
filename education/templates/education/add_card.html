{% extends 'education/base.html' %}

{% block title %}Add New Algorithm{% endblock %}

{% block content %}
    <h2>Add a New Algorithm</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" style="padding: 5px 15px; cursor: pointer;">Save Algorithm</button>
    </form>

    <br>
    <a href="{% url 'home' %}">Cancel</a>
{% endblock %}
