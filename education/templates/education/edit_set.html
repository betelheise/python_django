{% extends 'education/base.html' %}
{% block title %}Edit Group{% endblock %}

{% block content %}
    <h2>Edit Group: {{ alg_set.name }}</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background-color: #f0ad4e;">Save Changes</button>
    </form>

    <hr style="margin: 30px 0;">

    <!-- Delete Button Form -->
    <form method="POST" action="{% url 'delete_set' alg_set.pk %}" onsubmit="return confirm('WARNING: Are you sure you want to delete this group? All algorithms inside it will be permanently deleted!');">
        {% csrf_token %}
        <button type="submit" style="background-color: #e74c3c;">Delete Group</button>
    </form>

    <br>
    <a href="{% url 'set_detail' alg_set.pk %}">&larr; Cancel</a>
{% endblock %}
